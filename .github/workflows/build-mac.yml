name: Build macOS

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npx electron-builder --mac --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: SilverApp-mac
          path: dist/*.zip
