name: Build macOS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npx electron-builder --mac zip --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.1.0-mac
          name: Silver App v2.1.0 — macOS
          body: |
            ## Silver App v2.1 pour macOS

            Télécharge le .zip, extrais-le, et lance Silver App.

            Premier lancement : clic droit → Ouvrir → Ouvrir
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
