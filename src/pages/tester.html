<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <div class="titlebar">
    <button class="titlebar-btn" onclick="silver.minimize()">
      <svg width="10" height="1" viewBox="0 0 10 1"><rect fill="currentColor" width="10" height="1" rx=".5"/></svg>
    </button>
    <button class="titlebar-btn" onclick="silver.maximize()">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.2"><rect x=".6" y=".6" width="8.8" height="8.8" rx="1.5"/></svg>
    </button>
    <button class="titlebar-btn close" onclick="silver.close()">
      <svg width="10" height="10" viewBox="0 0 10 10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg>
    </button>
  </div>

  <div class="app-layout">
    <div class="sidebar">
      <div class="sidebar-brand" style="cursor:pointer" onclick="testerShowPage('t-home')">
        <div class="sidebar-brand-avatar" id="sidebarAvatar"></div>
        <div class="sidebar-brand-text">
          <h2>Silver App</h2>
          <span>Testeur · v2.1</span>
        </div>
      </div>

      <div class="sidebar-nav">
        <div class="nav-section">Principal</div>
        <a class="nav-item active" onclick="testerShowPage('t-home')"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></span> Accueil</a>
        <a class="nav-item" onclick="testerShowPage('t-overview')"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z" opacity=".8"/></svg></span> Vue d'ensemble</a>
        <a class="nav-item" onclick="testerShowPage('t-chat')"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></span> Chat General</a>
        <a class="nav-item" onclick="testerShowPage('t-dm')"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></span> DM Owner</a>

        <div class="nav-section">Projet</div>
        <a class="nav-item" onclick="testerShowPage('t-announcements')"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18 11v2h4v-2zm-2 6.46l2.18 1.63 1.12-1.5-2.18-1.63zM19.3 5.41l-1.12-1.5L16 5.54l1.12 1.5zM12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h4v-2H2zm9-9h2V0h-2z"/></svg></span> Annonces</a>
        <a class="nav-item" onclick="testerShowPage('t-tasks')"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8z"/></svg></span> Mes Taches</a>
        <a class="nav-item" onclick="testerShowPage('t-bugs')"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 8h-2.81a5.985 5.985 0 0 0-1.82-1.96L17 4.41 15.59 3l-2.17 2.17C12.96 5.06 12.49 5 12 5s-.96.06-1.41.17L8.41 3 7 4.41l1.62 1.63C7.88 6.55 7.26 7.22 6.81 8H4v2h2.09c-.05.33-.09.66-.09 1v1H4v2h2v1c0 .34.04.67.09 1H4v2h2.81c1.04 1.79 2.97 3 5.19 3s4.15-1.21 5.19-3H20v-2h-2.09c.05-.33.09-.66.09-1v-1h2v-2h-2v-1c0-.34-.04-.67-.09-1H20z"/></svg></span> Bugs Reports</a>
        <a class="nav-item" onclick="testerShowPage('t-suggestions')"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7z"/></svg></span> Suggestions</a>

        <div class="nav-section">Outils</div>
        <a class="nav-item" onclick="testerShowPage('t-testlab')"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M7 2v2h1v5.17L3.2 16.8A2.5 2.5 0 0 0 5.24 21h13.52a2.5 2.5 0 0 0 2.04-4.2L16 9.17V4h1V2zm2 2h6v5.83l1.08 1.42H7.92L9 9.83z"/></svg></span> Test Lab</a>
        <a class="nav-item" onclick="testerShowPage('t-botinfo')"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/></svg></span> Bot Info</a>
        <a class="nav-item" onclick="testerShowPage('t-changelog')"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8zm4 18H6V4h7v5h5zM8 15h8v2H8zm0-4h8v2H8z"/></svg></span> Changelog</a>
      </div>

      <div class="sidebar-user" style="justify-content:space-between">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="dot dot-green dot-pulse"></span>
          <span id="testerUserLabel">Testeur</span>
        </div>
        <button style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:10px;padding:2px 6px;border-radius:4px;transition:all .15s" onmouseenter="this.style.color='var(--red)'" onmouseleave="this.style.color='var(--dim)'" onclick="tLogout()" title="Se deconnecter">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>

    <div class="main">
      <div class="welcome-banner" id="tBanner">
        <div class="welcome-left">
          <h2 id="testerWelcome">Welcome, Testeur !</h2>
          <span id="testerSub">Testeur · Silver Bot</span>
        </div>
        <div class="welcome-pills">
          <div class="welcome-pill pill-blue"><div class="pill-label">Taches</div><div class="pill-value" id="tPillTasks">-</div></div>
          <div class="welcome-pill pill-gold"><div class="pill-label">Bugs</div><div class="pill-value" id="tPillBugs">-</div></div>
          <div class="welcome-pill pill-red"><div class="pill-label">Annonces</div><div class="pill-value" id="tPillAnnounce">-</div></div>
        </div>
      </div>

      <div class="content" id="testerContent"></div>

      <div class="status-bar">
        <div class="left">
          <span class="dot dot-green" style="width:5px;height:5px"></span>
          Silver App v2.3.1 · Testeur
        </div>
        <div id="testerClock"></div>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/tester.js"></script>
</body>
</html>
