<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020204;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Inter, -apple-system, sans-serif;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    .splash {
      text-align: center;
      animation: fadeIn .6s ease;
    }
    .logo {
      width: 72px; height: 72px;
      border-radius: 22px;
      background: linear-gradient(145deg, #2a2a35, #12121a);
      border: .5px solid rgba(200,200,220,.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.07), 0 8px 30px rgba(0,0,0,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      overflow: hidden;
    }
    .logo img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .logo span {
      font-size: 32px;
      font-weight: 500;
      background: linear-gradient(180deg, #f0f0f8, #a0a0b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .title {
      font-size: 28px;
      font-weight: 500;
      background: linear-gradient(90deg, #f0f0f8, #a8a8c0, #d8d8e8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: .5px;
      margin-bottom: 8px;
    }
    .sub {
      font-size: 12px;
      color: #404058;
      margin-bottom: 28px;
    }
    .loader {
      width: 120px;
      height: 2px;
      background: rgba(200,200,230,.06);
      border-radius: 2px;
      margin: 0 auto;
      overflow: hidden;
    }
    .loader-bar {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(200,200,230,.2), transparent);
      border-radius: 2px;
      animation: loading 1.2s ease-in-out infinite;
    }
    .glow {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(140,120,200,0.04) 0%, transparent 65%);
      pointer-events: none;
    }
    @keyframes fadeIn { from { opacity: 0; transform: scale(.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="splash">
    <div class="logo">
      <img id="splashImg">
      <span>S</span>
    </div>
    <div class="title">Silver App</div>
    <div class="sub">Chargement...</div>
    <div class="loader"><div class="loader-bar"></div></div>
  </div>
</body>
</html>
